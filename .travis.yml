sudo: required
language: generic
services:
  - docker

before_install:
  - travis_wait docker build -t nadjibdeveloper/docker-react -f Dockerfile.dev .

script:
  - docker run -e CI=true nadjibdeveloper/docker-react npm run test -- --coverage

deploy:
  provider: elasticbeanstalk
  region: "eu-west-1"
  app: "docker-react"
  env: "DockerReact-env"
  bucket_name: "elasticbeanstalk-eu-west-1-742424968078"
  bucket_path: "docker-react"
  on:
    branch: master
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key:
    secure: "$AWS_SECRET_KEY"